<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dr Shetye Academic Program – GOA SSC PC Tests</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">🎓</div>
      <div class="header-text">
        <h1 class="header-title">Dr Shetye Academic Program</h1>
        <p class="header-sub">Excellence in Competitive Exam Preparation</p>
      </div>
    </div>
  </header>

  <!-- HOME PAGE -->
  <main class="home-main">
    <div class="home-hero">
      <h2 class="hero-title">GOA SSC Police Constable</h2>
      <p class="hero-sub">Mock Test Series — Select a test to begin</p>
    </div>

    <div class="tests-grid" id="testsGrid">
      <!-- Cards injected by home.js -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-name">Maitreya Hinde</span>
      <span class="footer-sep">|</span>
      <span class="footer-phone">📞 7358425108</span>
      <span class="footer-sep">|</span>
      <span class="footer-role">Academic Coordinator</span>
      <span class="footer-sep">·</span>
      <span class="admin-link" onclick="openAdminModal()">Admin</span>
    </div>
  </footer>

  <!-- ADMIN MODAL -->
  <div id="adminModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:center;justify-content:center;">
    <div class="modal-box">
      <h3>Admin Login</h3>
      <p style="font-size:.85rem;color:#6b7280;margin-bottom:14px;">View all test results &amp; merit lists</p>
      <input type="password" id="adminPass" placeholder="Admin password"/>
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button class="btn btn-primary" style="flex:1;" onclick="adminLogin()">Login</button>
        <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">Cancel</button>
      </div>
      <p id="adminError" style="display:none;color:#dc2626;font-size:.85rem;margin-top:10px;">❌ Wrong password</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="home.js"></script>
</body>
</html>
