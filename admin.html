<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel – Dr Shetye Academic Program</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <header class="site-header">

        <h2 style="font-family:'Playfair Display',serif;color:#0d2b55;font-size:1.6rem;">Central Merit Lists</h2>

      <a href="index.html" class="btn btn-outline" style="text-decoration:none;">← Back to Home</a>

    <!-- Tab buttons for each test -->
    <div class="admin-tabs" id="adminTabs"></div>

    <!-- Results panel -->
    <div class="admin-results-panel" id="adminResultsPanel">
      <p style="color:#6b7280;text-align:center;padding:40px;">Select a test above to view results.</p>
    </div>

  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-name">Maitreya Hinde</span>
      <span class="footer-sep">|</span>
      <span class="footer-phone">📞 7358425108</span>
      <span class="footer-sep">|</span>

  <script src="config.js"></script>
  <script src="admin.js"></script>
